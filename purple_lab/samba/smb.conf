[global]
# Grunnleggende serveridentitet
   workgroup = WORKGROUP
   server string = Bedriften AS File Server
   netbios name = FILSERVER
   security = user
   map to guest = Bad User
   guest account = nobody
   server role = standalone server

# Logg til fil slik at rsyslog kan hente loggene via imfile
   logging = file
   log file = /var/log/samba/log.smbd
   max log size = 0
   log level = 2
   
# Kun SMB over TCP (445), NetBIOS skrudd av
   disable netbios = yes
   smb ports = 445

# Gamle og usikre protokoller aktivert for lab-scenario
   server min protocol = NT1
   server signing = disabled
   client signing = disabled

# Offentlig share - alle har lesetilgang
[Public]
   path = /mount/public
   browseable = yes
   read only = yes
   guest ok = yes

# Sensitiv share - kun admin og oldadmin har tilgang
[Sensitive]
   path = /mount/sensitive
   browseable = yes
   read only = yes
   guest ok = no
   valid users = admin oldadmin
